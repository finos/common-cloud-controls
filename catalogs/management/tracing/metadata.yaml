      service: AWS X-Ray
      url: https://docs.aws.amazon.com/xray/
    - provider: Azure
      service: Azure Application Insights (Azure Monitor)
      url: https://learn.microsoft.com/azure/azure-monitor/app/app-insights-overview
    - provider: GCP
      service: Google Cloud Trace
      url: https://cloud.google.com/trace/docs
