# Canonical CCC group definitions — the single source of truth.
#
# Catalog entries (capabilities, controls, threats) reference a group by `id`.
# At compile time the toolkit injects the full definition below into the
# artifact's `groups`. Referencing a group id that is not defined here is a
# compile error, which keeps every catalog's grouping consistent.
groups:
  - id: Encryption
    title: Encryption
    description: |
      The Encryption group covers entries related to protecting data
      confidentiality and integrity through cryptographic mechanisms. This
      includes encryption in transit and at rest, key management, and
      certificate lifecycle management.
  - id: Access
    title: Access Control
    description: |
      The Access Control group covers entries related to authentication,
      authorization, and trust perimeter enforcement. This includes
      multi-factor authentication, least privilege access, network access
      rules, and prevention of unauthorized access or reconnaissance.
  - id: Observability
    title: Observability
    description: |
      The Observability group covers entries related to logging, monitoring,
      metrics, alerting, and event publication. This includes audit trail
      integrity, enumeration detection, and protection against tampering or
      unauthorized access to operational telemetry.
  - id: Data
    title: Data Resilience
    description: |
      The Data Resilience group covers entries related to ensuring data
      availability, integrity, and sovereignty across its lifecycle. This
      includes replication, backup, recovery, region restrictions, and
      protection against data loss or corruption.
  - id: Resource
    title: Resource Management
    description: |
      The Resource Management group covers entries related to the lifecycle,
      configuration, and operational integrity of cloud resources. This
      includes resource exhaustion, tag manipulation, version rollback,
      scaling, and cost management.
  - id: Compute
    title: Compute
    description: |
      The Compute group covers entries related to processing, execution, and
      runtime infrastructure. This includes CPU, memory, storage allocation,
      network ports, command-line interfaces, and elastic scaling.
  - id: Ingestion
    title: Ingestion
    description: |
      The Ingestion group covers entries related to how a service receives or
      retrieves data, inputs, or commands for processing. This includes both
      active (pull-based) and passive (push-based) ingestion patterns.
  - id: Networking
    title: Networking
    description: |
      The Networking group covers entries related to network infrastructure,
      connectivity, and traffic management. This includes virtual networks,
      subnets, load balancing, DNS, routing, peering, and network-level access
      controls.
  - id: Orchestration
    title: Orchestration
    description: |
      The Orchestration group covers entries related to coordinating and
      managing workloads across distributed systems. This includes container
      orchestration, job scheduling, CI/CD pipelines, build automation, and
      service mesh management.
  - id: Processing
    title: Data Processing
    description: |
      The Data Processing group covers entries related to transforming,
      enriching, and moving data through pipelines. This includes ETL/ELT,
      stream and batch processing, data lineage, schema evolution, and
      workflow orchestration for data workloads.
  - id: Messaging
    title: Messaging
    description: |
      The Messaging group covers entries related to asynchronous communication
      between services. This includes publish-subscribe, message queuing, topic
      management, delivery guarantees, ordering, filtering, and dead-letter
      handling.
  - id: MachineLearning
    title: Machine Learning
    description: |
      The Machine Learning group covers entries related to building, training,
      deploying, and managing ML models and AI systems. This includes
      development environments, experiment tracking, model registries,
      inference, generative AI, prompt engineering, and model governance.
  - id: user-interaction
    title: User Interaction Layer
    description: |
      The entry point of the system, providing the interface through which
      users express intent, submit inputs, and review agent outputs.
  - id: agent-gateway
    title: Agent Gateway Layer
    description: |
      The controlled entry point into the agent layer, governing how
      applications discover, reach, and are policed before invoking agents.
  - id: agent
    title: Agent Layer
    description: |
      The core reasoning, coordination, and task-execution subsystems,
      including the sandboxed runtime, tools, memory, and learning.
  - id: knowledge
    title: Knowledge Layer
    description: |
      The information foundation that grounds agent reasoning through
      authoritative source repositories and semantic retrieval.
  - id: llm
    title: LLM Layer
    description: |
      The governed interface for accessing approved large language models,
      including registry, routing, and model-interaction guardrails.
  - id: mcp
    title: MCP Layer
    description: |
      The governed interface for accessing approved MCP servers, including
      registry, routing, and tool-interaction guardrails.
  - id: evaluation
    title: Evaluation Layer
    description: |
      Continuous oversight, quality assurance, and adaptive improvement
      through feedback, human supervision, and runtime protection.
  - id: PREV
    title: Preventive
    description: Prevention and Risk Mitigation
  - id: DET
    title: Detective
    description: Detection and Continuous Improvement
  - id: information-leakage
    title: Information Leakage
    description: |
      Sensitive data exposed through model memorization, hosted-provider
      controls, or the knowledge layer's vector store.
  - id: data-poisoning
    title: Data Poisoning
    description: |
      Manipulation of training, fine-tuning, third-party, or adaptive-learning
      data to corrupt model and agent behaviour.
  - id: model-availability
    title: Model Availability
    description: |
      Disruption of model serving through cost exhaustion, provider outages, or
      resource exhaustion on serving infrastructure.
  - id: prompt-injection
    title: Prompt Injection
    description: |
      Direct or indirect manipulation of model inputs to override intended
      behaviour, hijack workflows, or extract internal state.
  - id: operational
    title: Operational
    description: |
      Risks arising from how the system is used and perceived, including scope
      creep beyond validated use and reputational harm.
  - id: output-integrity
    title: Output Integrity
    description: |
      Confident but incorrect, fabricated, inconsistent, or ungrounded outputs
      that diverge from facts, retrieved sources, or business intent.
  - id: model-integrity
    title: Model Integrity
    description: |
      Threats to the integrity, stability, and provenance of the foundation
      model through silent drift or adversarial tampering.
  - id: data-quality
    title: Data Quality
    description: |
      Inaccurate, outdated, biased, or drifting data that degrades the
      reliability and fairness of outputs over time.
  - id: fairness
    title: Fairness
    description: |
      Systematically discriminatory outcomes arising from biased data, design
      choices, proxy variables, or uncorrected feedback loops.
  - id: governance-compliance
    title: Governance and Compliance
    description: |
      Regulatory, supervisory, explainability, and intellectual-property
      exposure for the system's outputs and operation.
  - id: agentic-security
    title: Agentic Security
    description: |
      Risks specific to autonomous and multi-agent operation, including
      authorization bypass, tool-chain manipulation, supply-chain compromise,
      state poisoning, multi-agent trust violations, and credential harvesting.
