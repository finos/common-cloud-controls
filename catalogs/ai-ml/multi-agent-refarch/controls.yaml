  - id: CCC.MARefArc.CN22
    title: Preserving Source Data Access Controls in AI Systems
    objective: >-
      Propagate the access controls of source data into the retrieval path so
      that retrieval and generation cannot expose content a requesting user is
      not authorized to see.
    group: DET
    assessment-requirements:
      - id: CCC.MARefArc.CN22.AR01
        text: >-
          Retrieval MUST enforce the access controls of the underlying source
          data for the requesting principal.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
      - id: CCC.MARefArc.CN22.AR02
        text: >-
          Embeddings and retrieved context MUST be filtered by the requester's
          entitlements before being supplied to the model.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
    guidelines:
      - reference-id: finos-air
        entries:
          - reference-id: AIR-DET-016
