  - id: CCC.MARefArc.CN23
    title: Agent Decision Audit and Explainability
    objective: >-
      Record an auditable trace of agent decisions, including tool selections,
      inputs, and rationale, sufficient to explain and review autonomous
      actions after the fact.
    group: DET
    assessment-requirements:
      - id: CCC.MARefArc.CN23.AR01
        text: >-
          The system MUST record an auditable decision trace for each agent
          action, including the tools invoked and the inputs and rationale
          leading to them.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
      - id: CCC.MARefArc.CN23.AR02
        text: >-
          Decision traces MUST be retained and reviewable to support
          explainability and post-incident analysis.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
