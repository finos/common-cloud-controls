title: Multi-Agent Reference Architecture Capability Catalog
metadata:
  id: CCC.MARefArch.CP
  type: CapabilityCatalog
  gemara-version: "1.2.0"
  version: "dev"
  date: "2026-05-31T00:00:00Z"
  description: >-
    Subsystem-level capabilities of the multi-agent reference architecture,
    grouped by architectural layer. Each capability describes what a subsystem
    provides along with its defining and security-relevant properties.
groups:
  - id: user-interaction
    title: User Interaction Layer
    description: >-
      The entry point of the system, providing the interface through which
      users express intent, submit inputs, and review agent outputs.
  - id: agent-gateway
    title: Agent Gateway Layer
    description: >-
      The controlled entry point into the agent layer, governing how
      applications discover, reach, and are policed before invoking agents.
  - id: agent
    title: Agent Layer
    description: >-
      The core reasoning, coordination, and task-execution subsystems,
      including the sandboxed runtime, tools, memory, and learning.
  - id: knowledge
    title: Knowledge Layer
    description: >-
      The information foundation that grounds agent reasoning through
      authoritative source repositories and semantic retrieval.
  - id: llm
    title: LLM Layer
    description: >-
      The governed interface for accessing approved large language models,
      including registry, routing, and model-interaction guardrails.
  - id: mcp
    title: MCP Layer
    description: >-
      The governed interface for accessing approved MCP servers, including
      registry, routing, and tool-interaction guardrails.
  - id: evaluation
    title: Evaluation Layer
    description: >-
      Continuous oversight, quality assurance, and adaptive improvement
      through feedback, human supervision, and runtime protection.
  - id: observability
    title: Observability Layer
    description: >-
      End-to-end visibility into system behavior, collecting and correlating
      telemetry emitted by every other layer.
capabilities:
  - id: UI-01
    title: User-facing application surface
    description: >-
      Presentation and orchestration surface (web, mobile, chatbot, workflow
      tool, or integrated enterprise system) that captures user intent,
      forwards requests to the agent layer, and returns agent outputs.
    group: user-interaction
  - id: UI-02
    title: Human-in-the-loop output review
    description: >-
      Application-embedded controls that allow users to review, approve, or
      modify agent outputs before they are executed or shared.
    group: user-interaction
  - id: AGW-01
    title: Agent registry and lifecycle management
    description: >-
      Catalog of available agents with their capabilities, metadata, and
      configuration, supporting versioning, lifecycle management, and
      controlled onboarding of new agents.
    group: agent-gateway
  - id: AGW-02
    title: Agent request routing
    description: >-
      Validates incoming application requests and routes each to the correct
      agent or agent group, abstracting agent-layer complexity behind a
      consistent interface.
    group: agent-gateway
  - id: AGW-03
    title: Agent-ingress zero-trust guardrails
    description: >-
      Treats all inputs as untrusted and enforces authentication,
      authorization, input validation, content filtering, access control,
      rate limits, and dynamic policy before any request reaches an agent.
    group: agent-gateway
  - id: AGT-01
    title: Agent collaboration and orchestration patterns
    description: >-
      Supports supervisor/worker decomposition, skills-based routing, and
      agent-as-a-tool handoff for decomposing and executing complex tasks
      across multiple agents.
    group: agent
  - id: AGT-02
    title: Unified sandboxed agent runtime
    description: >-
      Secure, sandboxed environment where all agentic reasoning and execution
      occurs, providing task state management for pause/resume/handoff and
      intercepting and validating tool calls with credentials handled securely
      within the sandbox.
    group: agent
  - id: AGT-03
    title: Built-in trusted tools
    description: >-
      A collection of bundled, trusted tools providing fundamental
      capabilities: the MCP client bridge to the external MCP layer, a
      sandboxed shell, workspace I/O, and web search.
    group: agent
  - id: AGT-04
    title: Agent memory
    description: >-
      Short-term in-session context management (trimming and summarization to
      control length, cost, and latency) and durable long-term memory across
      sessions, including session summaries and user/task personalization.
    group: agent
  - id: AGT-05
    title: Sandboxed workspace file system
    description: >-
      A sandboxed, persistent file system that agents use to read and write
      files, enabling work with large artifacts.
    group: agent
  - id: AGT-06
    title: Adaptive learning
    description: >-
      Generates learning signals based on execution outcomes to refine
      prompts, adjust agent configurations, or improve tool-selection
      strategies.
    group: agent
  - id: KNW-01
    title: Authoritative knowledge source bases
    description: >-
      Internal and external repositories of structured data, unstructured
      documents, and graph-based representations that provide authoritative
      information for grounding.
    group: knowledge
  - id: KNW-02
    title: Vector-based semantic retrieval
    description: >-
      Vector databases providing semantic search and grounding so agents can
      find relevant information from large text corpora.
    group: knowledge
  - id: LLM-01
    title: Approved-model registry and lifecycle
    description: >-
      Catalog of approved models with metadata, version information,
      configuration parameters, and usage constraints, ensuring agents access
      only models meeting organizational, regulatory, and security standards.
    group: llm
  - id: LLM-02
    title: LLM inference gateway routing
    description: >-
      Validates inference requests and routes each to the correct model
      instance, abstracting model hosting behind a consistent interface.
    group: llm
  - id: LLM-03
    title: Model-interaction zero-trust guardrails
    description: >-
      Enforces authentication and authorization for every inference request
      and applies input validation against prompt injection, output filtering
      and redaction, access control, rate limits, and cost management before
      and after model execution.
    group: llm
  - id: MCP-01
    title: Approved MCP server registry and lifecycle
    description: >-
      Catalog of approved MCP servers with metadata, capabilities,
      configuration, and usage constraints, ensuring agents connect only to
      servers meeting organizational, security, and compliance requirements.
    group: mcp
  - id: MCP-02
    title: MCP connection gateway routing
    description: >-
      Validates MCP connection requests and routes each to the correct server
      instance, abstracting MCP connectivity behind a consistent interface.
    group: mcp
  - id: MCP-03
    title: MCP-interaction zero-trust guardrails
    description: >-
      Enforces authentication and authorization for every MCP request and
      governs which agents may use which tools, applying rate limits and
      validating tool-call parameters.
    group: mcp
  - id: EVL-01
    title: Feedback engine
    description: >-
      Collects and aggregates structured and unstructured feedback from users,
      evaluators, and automated systems, including correctness assessments,
      preference signals, and quality ratings, to inform system improvement.
    group: evaluation
  - id: EVL-02
    title: Human supervision and oversight
    description: >-
      Mechanisms for human reviewers to inspect, approve, correct, or override
      agent outputs, supporting human-in-the-loop and human-over-the-loop
      workflows for sensitive or high-impact tasks.
    group: evaluation
  - id: EVL-03
    title: Runtime protection
    description: >-
      Monitors agent actions and model outputs during execution to detect
      unsafe, non-compliant, or anomalous behavior, enforcing constraints,
      blocking disallowed actions, or triggering escalation.
    group: evaluation
  - id: OBS-01
    title: Cross-layer telemetry collection
    description: >-
      Captures logs, traces, metrics, and events emitted by every layer to
      support debugging, auditability, distributed tracing, and operational
      monitoring across the request lifecycle.
    group: observability
  - id: OBS-02
    title: Anomaly detection
    description: >-
      Identifies unusual or unexpected patterns across telemetry to surface
      failures, regressions, misuse, or emerging risks before they impact
      performance or compliance.
    group: observability
  - id: OBS-03
    title: Signal correlation
    description: >-
      Correlates signals across logs, traces, metrics, and events into a
      unified view, connecting symptoms to root causes across cross-layer
      dependencies.
    group: observability
