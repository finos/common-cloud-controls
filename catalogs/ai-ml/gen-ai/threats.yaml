            strength: 0 # Not yet specified
            remarks: Generate Content
          - reference-id: CCC.GenAI.CP24
            strength: 0 # Not yet specified
            remarks: Content Moderation

  - id: CCC.GenAI.TH02
    group: Ingestion
    title: Data Poisoning
    description: |
      Data poisoning occurs when training, fine-tuning or embedding data is
      tampered with in order to modify the model's behaviour, for example 
      steering it towards specific outputs, degrading performance or 
      introducing backdoors.
    capabilities:
      - reference-id: CCC
