            remarks: Content Moderation

  - id: CCC.GenAI.TH03
    group: Data
    title: Sensitive Information Disclosure
    description: |
      Sensitive data can be memorised by the model from user interaction or
      training and may then be leaked to unintended and unauthorised parties 
      by querying the model, for example through crafted prompts.
    capabilities:
      - reference-id: CCC
        entries:
          - reference-id: CCC.Core.CP02
            strength: 0 # Not yet specified
            remarks: Encryption at Rest Enabled by Default
          - reference-id: CCC.Core.CP06
