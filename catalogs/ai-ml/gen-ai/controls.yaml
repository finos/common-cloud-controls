            strength: 0 # Not yet specified
            remarks: Insecure / Unreliable Model Output
          - reference-id: CCC.GenAI.TH05
            strength: 0 # Not yet specified
            remarks: Model Overreliance
          - reference-id: CCC.GenAI.TH06
            strength: 0 # Not yet specified
            remarks: Unintended Action by a Model-Based Agent
    guidelines:
      - reference-id: FINOS-AIGF
        entries:
          - reference-id: AIR-PREV-003
            strength: 0 # Not yet specified
            remarks: User/App/Model Firewalling/Filtering
          - reference-id: AIR-PREV-017
            strength: 0 # Not yet specified
            remarks: AI Firewall Implementation and Management
          - reference-id: AIR-PREV-002
            strength: 0 # Not yet specified
