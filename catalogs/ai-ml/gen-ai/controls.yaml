            strength: 0 # Not yet specified
            remarks: Sanitize Training Data
      - reference-id: agent-threat-rules
        entries:
          - reference-id: ATR-2026-00002
            strength: 0 # Not yet specified
            remarks: Indirect Prompt Injection (RAG / ingested-content / tool-output path) — detection-side coverage for malicious payloads embedded in ingested data per AR01.
          - reference-id: ATR-2026-00021
            strength: 0 # Not yet specified
            remarks: Credential / API-key disclosure in ingested content — sensitive-information path for AR01 detection.

  - id: CCC.GenAI.CN05
    group: MachineLearning
    title: Citations and Source Traceability
    objective: |
      Require the GenAI system to provide citations or direct links
      back to the source documents used to generate a response, in
      to enhance the transparency, trustworthiness, and verifiability
      of AI-generated content.
    assessment-requirements:
      - id: CCC.GenAI.CN05.AR01
        text: |
          When a RAG-enabled system generates a response containing information
          retrieved from its knowledge base, then the response MUST include a
          verifiable citation that links back to the specific source document.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
        recommendation: ""
    threats:
      - reference-id: CCC
        entries:
          - reference-id: CCC.GenAI.TH09
            strength: 0 # Not yet specified
            remarks: Lack of Explainability
          - reference-id: CCC.GenAI.TH04
            strength: 0 # Not yet specified
            remarks: Insecure / Unreliable Model Output
    guidelines:
      - reference-id: FINOS-AIGF
        entries:
          - reference-id: AIR-DET-013
            strength: 0 # Not yet specified
            remarks: |
              Providing Citations and Source Traceability for AI-Generated Information

  - id: CCC.GenAI.CN06
    group: Access
    title: Least Privilege for Plugins
    objective: |
      Restricts the permissions of any external tools the GenAI system
      can call to limit the potential damage if an agent is coerced
      to perform unintended actions or vulnerabilities in the tools
      are exploited.
    assessment-requirements:
      - id: CCC.GenAI.CN06.AR01
        text: |
          When an LLM invokes an external tool (e.g., an API, a plugin),
          then the tool MUST operate with the least privileges required
          for performing its intended functionality.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
        recommendation: ""
    threats:
      - reference-id: CCC
        entries:
          - reference-id: CCC.GenAI.TH07
            strength: 0 # Not yet specified
            remarks: Insecure Plugin
          - reference-id: CCC.GenAI.TH06
            strength: 0 # Not yet specified
            remarks: Unintended Action by a Model-Based Agent
    guidelines:
      - reference-id: SAIF
        entries:
          - reference-id: Agent Permissions
            strength: 0 # Not yet specified
      - reference-id: agent-threat-rules
        entries:
          - reference-id: ATR-2026-00010
            strength: 0 # Not yet specified
            remarks: Tool / MCP response with malicious content — covers TH07 Insecure Plugin at the tool-response layer.
          - reference-id: ATR-2026-00040
            strength: 0 # Not yet specified
            remarks: Privilege Escalation / Admin Function Access via tool calls — covers the over-privileged-tool-invocation aspect of AR01.
          - reference-id: ATR-2026-00060
            strength: 0 # Not yet specified
            remarks: Skill / Plugin Impersonation — covers the trust-boundary aspect of plugin selection.
          - reference-id: ATR-2026-00441
            strength: 0 # Not yet specified
            remarks: Semantic Kernel SessionsPythonPlugin CVE-2026-25592 — over-privileged plugin enabling sandbox escape via autostart-path file write. Concrete TH06 / TH07 example.

  - id: CCC.GenAI.CN07
    group: MachineLearning
    title: Model Version Pinning
    objective: |
      Mandate that applications are locked ("pinned") to a specific,
      tested version of a foundational model to prevent unexpected
      behaviour changes introduced by provider-side updates.
    assessment-requirements:
      - id: CCC.GenAI.CN07.AR01
        text: |
          When an application makes an API call to a foundational model in a
          production environment, then it MUST specify an explicit version
          identifier.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
        recommendation: ""
    threats:
      - reference-id: CCC
        entries:
          - reference-id: CCC.GenAI.TH10
            strength: 0 # Not yet specified
            remarks: Model Version Drift
    guidelines:
      - reference-id: FINOS-AIGF
        entries:
          - reference-id: AIR-PREV-010
            strength: 0 # Not yet specified
            remarks: AI Model Version Pinning

  - id: CCC.GenAI.CN08
    group: MachineLearning
    title: Quality Control and Red Teaming
    objective: |
      Establish a formal program for quality evaluation and adversarial
      testing (red teaming) to ensure GenAI system meet all business,
      quality, security and compliance requirements before getting deployed
      into production environments.
    assessment-requirements:
      - id: CCC.GenAI.CN08.AR01
        text: |
          When a new AI model is considered for production deployment, it
          MUST undergo a formal red teaming and quality assurance review.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
        recommendation: ""
      - id: CCC.GenAI.CN08.AR02
        text: |
          If model quality review or red teaming identifies an issue that exceeds
          the organization's risk tolerance, the model MUST NOT be deployed until
          the issue is remediated.
        applicability:
          - tlp-clear
          - tlp-green
          - tlp-amber
          - tlp-red
        recommendation: ""
