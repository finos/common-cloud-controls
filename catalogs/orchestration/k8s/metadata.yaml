metadata:
  id: CCC.K8S
  title: CCC Managed Kubernetes Container Orchestration
  description: |
    Provides fully managed environments for running Kubernetes clusters without requiring
    users to handle control-plane operations like upgrades, patching, or high‑availability
    setups. They automate cluster provisioning, scaling, and integration with each
    provider’s native ecosystem, offering secure, reliable, and production‑ready
    Kubernetes deployments.
  category-ids: 
    - CCC.Orchestration
  version: ""
  last-modified: "2026-02-18T00:00:00Z"
  example-csp-services:
