      service: Amazon Elastic Kubernetes Service (EKS)
      url: https://docs.aws.amazon.com/eks/
    - provider: Azure
      service: Azure Kubernetes Service (AKS)
      url: https://learn.microsoft.com/azure/aks/
    - provider: GCP
      service: Google Kubernetes Engine (GKE)
      url: https://cloud.google.com/kubernetes-engine/docs
