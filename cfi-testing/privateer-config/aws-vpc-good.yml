loglevel: info
write-directory: evaluation_results
write: true
output: yaml

# Targets the compliant (good) VPC: cfi-20260526t102301z-vpc.
# All scenarios are expected to PASS.
#
# Behavioural plugin auto-discovers every VPC tagged CFIControlSet=CCC.VPC, so
# the `resource` var below filters the run down to just the good VPC by Name tag.
#
# All values hard-coded against the 20260526t102301z deployment in us-east-1.

services:
  awsVpcGood:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.VPC
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: vpc
      tags: "@MAIN @CCC.VPC"
      instance-id: "20260526t102301z"
      provider: aws
      region: us-east-1
      resource: "cfi-20260526t102301z-vpc"
      permitted-regions:
        - us-east-1
      # In-scope receiver and requester VPC fixtures (cfi-20260526t102301z deployment).
      receiver-vpc-id: "vpc-0d5625cb163976d86"
      non-allowlisted-requester-vpc-id: "vpc-0666381e8a3976bde"
      allowed-requester-vpc-ids:
        - "vpc-0a591620e00092dc2"  # cfi-20260526t102301z-vpc-cn03-allowed-requester-01     (10.40.0.0/20)
        - "vpc-0dae16d47368ba7ae"  # cfi-20260526t102301z-vpc-cn03-allowed-requester-02     (10.40.16.0/20)
      disallowed-requester-vpc-ids:
        - "vpc-0eadc3a916f373b88"  # cfi-20260526t102301z-vpc-cn03-disallowed-requester-01  (10.30.0.0/20)
        - "vpc-0a7d07499ce3992e8"  # cfi-20260526t102301z-vpc-cn03-disallowed-requester-02  (10.30.16.0/20)
      # Reference to the intentionally non-compliant VPC, used by any future
      # cross-VPC negative-check scenarios. Behavioural features don't read it today.
      bad-vpc-id: "vpc-0f3af4b6986f1e0ab"
      # ── Logging service coordinates ──────────────────────────────────────
      # Explicit destinations consumed by the logging service (no discovery).
      # CN04 reads flow log records from this CloudWatch Logs group; the
      # terraform default is /aws/vpc/flow-logs/<vpc-name>.
      aws-flow-log-group-name: "/aws/vpc/flow-logs/cfi-20260526t102301z-vpc"
