loglevel: info
write-directory: evaluation_results
write: true
output: yaml

services:
  azureServerlessComputing:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.SvlsComp
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: serverless-computing
      ServiceType: serverless-computing
      tags: "@Behavioural @serverless-computing"
      provider: azure
      region: eastus
      resource: "finos-ccc-integration-20260527t120000z-fn-main"
      function-name: "finos-ccc-integration-20260527t120000z-fn-main"
      azure-subscription-id: "${AZURE_SUBSCRIPTION_ID}"
      azure-resource-group: "finos-ccc-integration-20260527t120000z-rg"
      private-endpoint-url: "https://finos-ccc-integration-20260527t120000z-fn-main.privatelink.azurewebsites.net/api/HttpTrigger"
      public-invoke-url: ""
      rate-limit-threshold: 10
      burst-overrun: 15
      permitted-regions:
        - eastus
      azure-log-analytics-workspace-id: "${AZURE_LOG_ANALYTICS_WORKSPACE_ID}"
      test-identities:
        testUserNoAccess:
          user-name: "${AZURE_TEST_USER_NO_ACCESS_USER_NAME}"
          client_id: "${AZURE_TEST_USER_NO_ACCESS_CLIENT_ID}"
          client_secret: "${AZURE_TEST_USER_NO_ACCESS_CLIENT_SECRET}"
          object_id: "${AZURE_TEST_USER_NO_ACCESS_OBJECT_ID}"
