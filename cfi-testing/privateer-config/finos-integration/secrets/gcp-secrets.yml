loglevel: info
write-directory: evaluation_results
write: true
output: yaml

services:
  gcpSecrets:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.SecMgmt
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: secrets
      service-type: secrets
      tags: "@Behavioural @secrets"
      provider: gcp
      catalog-versions:
        CCC.Core: v2025.10
        CCC.SecMgmt: DEV
      region: us-central1
      gcp-project-id: "${GCP_PROJECT_ID}"
      resource: "finos-ccc-integration-secret-main"
      gcp-secret-id: "finos-ccc-integration-secret-main"
      stale-version-id: "${STALE_VERSION_ID}"
      authorized-region: "us-central1"
      unauthorized-region: "europe-west1"
      permitted-regions:
        - us-central1
