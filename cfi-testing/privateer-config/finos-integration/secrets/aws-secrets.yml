loglevel: info
write-directory: evaluation_results
write: true
output: yaml

services:
  awsSecrets:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.SecMgmt
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: secrets
      service-type: secrets
      tags: "@Behavioural @secrets"
      provider: aws
      catalog-locations:
        CCC.Core: website/src/data/ccc-releases/CCC.Core_v2025.10.yaml
        CCC.SecMgmt: website/src/data/ccc-releases/CCC.SecMgmt_DEV.yaml
      region: us-east-1
      resource: "finos-ccc-integration-secret-main"
      stale-version-id: "${STALE_VERSION_ID}"
      authorized-region: "us-east-1"
      unauthorized-region: "eu-west-1"
      permitted-regions:
        - us-east-1
