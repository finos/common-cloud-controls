loglevel: info
write-directory: evaluation_results
write: true
output: yaml

services:
  azureSecrets:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.SecMgmt
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: secrets
      service-type: secrets
      tags: "@Behavioural @secrets"
      provider: azure
      catalog-versions:
        CCC.Core: v2025.10
        CCC.SecMgmt: DEV
      region: eastus
      azure-subscription-id: "${AZURE_SUBSCRIPTION_ID}"
      azure-tenant-id: "${AZURE_TENANT_ID}"
      resource: "finos-ccc-integration-secret-main"
      azure-key-vault-name: "finoscccintkvsec"
      azure-key-vault-uri: "https://finoscccintkvsec.vault.azure.net/"
      azure-secret-name: "finos-ccc-integration-secret-main"
      stale-version-id: "${STALE_VERSION_ID}"
      authorized-region: "westus2"
      unauthorized-region: "westeurope"
      permitted-regions:
        - westus2
