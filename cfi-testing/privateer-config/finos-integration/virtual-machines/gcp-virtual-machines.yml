loglevel: info
write-directory: evaluation_results
write: true
output: yaml

services:
  gcpVirtualMachines:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.VM
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: virtual-machines
      service-type: virtual-machines
      tags: "@Behavioural @virtual-machines"
      provider: gcp
      catalog-locations:
        CCC.Core: website/src/data/ccc-releases/CCC.Core_v2025.10.yaml
        CCC.VM: website/src/data/ccc-releases/CCC.VM_DEV.yaml
      region: us-central1
      gcp-project-id: "${GCP_PROJECT_ID}"
      resource: "finos-ccc-integration-vm-main"
      permitted-regions:
        - us-central1
      host-name: "${GCP_VM_HOSTNAME}"
      port-number: "22"
      test-listener-port: 22
      allowed-source-cidr: "10.0.0.0/8"
      test-identities:
        test-user-no-access:
          user-name: "${GCP_TEST_USER_NO_ACCESS_NAME}"
          service_account_key: "${GCP_TEST_USER_NO_ACCESS_SA_KEY_JSON}"
        test-user-write:
          user-name: "${GCP_TEST_USER_WRITE_NAME}"
          service_account_key: "${GCP_TEST_USER_WRITE_SA_KEY_JSON}"
        test-user-admin:
          user-name: "${GCP_TEST_USER_ADMIN_NAME}"
          service_account_key: "${GCP_TEST_USER_ADMIN_SA_KEY_JSON}"
