loglevel: info
write-directory: evaluation_results
write: true
output: yaml

services:
  gcpServerlessGood:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.SvlsComp
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: serverless-computing
      ServiceType: serverless-computing
      tags: "@Behavioural @serverless-computing"
      provider: gcp
      region: us-central1
      gcp-project-id: "${GCP_PROJECT_ID}"
      resource: "cfi-20260527t120000z-fn-good"
      function-name: "cfi-20260527t120000z-fn-good"
      private-endpoint-url: "internal-only"
      public-invoke-url: ""
      rate-limit-threshold: 10
      burst-overrun: 15
      permitted-regions:
        - us-central1
      test-identities:
        testUserNoAccess:
          user-name: "${GCP_TEST_USER_NO_ACCESS_NAME}"
          service_account_key: "${GCP_TEST_USER_NO_ACCESS_SA_KEY_JSON}"
