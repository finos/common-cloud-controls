loglevel: info
write-directory: evaluation_results
write: true
output: yaml

# Azure secrets behavioural tests against the AVM key vault in
# ccc-cfi-compliance/remote/azure/avm.
#
# Populated from terraform output after apply (instance_id = 20260611):
#   resource_group_name = avm-testing
#   key_vault.name = avmkv20260611
#   key_vault.uri = https://avmkv20260611.vault.azure.net/
#
# Source azure-env.sh for test principal credentials before running.
#
# Known gaps vs full CFI secrets harness (tests may skip or fail until addressed):
#   - No test secret provisioned in AVM terraform yet (create manually or extend stack)
#   - public_network_access_enabled = false (data-plane access needs network/RBAC setup)
#   - Catalog mapping is CCC.KeyMgmt in terraform; behavioural harness uses CCC.SecMgmt

services:
  azureSecrets:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.SecMgmt
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: secrets
      service-type: secrets
      tags: "@Behavioural @secrets"
      provider: azure
      catalog-versions:
        CCC.Core: v2025.10
        CCC.SecMgmt: DEV
      region: westus2
      azure-subscription-id: "${AZURE_SUBSCRIPTION_ID}"
      azure-tenant-id: "${AZURE_TENANT_ID}"
      resource: "ccc-avm-test-secret-20260611"
      azure-key-vault-name: "avmkv20260611"
      azure-key-vault-uri: "https://avmkv20260611.vault.azure.net/"
      azure-secret-name: "ccc-avm-test-secret-20260611"
      stale-version-id: "${STALE_VERSION_ID}"
      authorized-region: "westus2"
      unauthorized-region: "westeurope"
      permitted-regions:
        - westus2
