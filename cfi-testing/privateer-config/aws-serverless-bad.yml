loglevel: info
write-directory: evaluation_results
write: true
output: yaml

# Bad fixture: public function URL enabled.

services:
  awsServerlessBad:
    plugin: ccc-behavioural-plugin
    policy:
      catalogs:
        - CCC.SvlsComp
      applicability:
        - tlp-amber
        - tlp-red
    vars:
      service: serverless-computing
      ServiceType: serverless-computing
      tags: "@Behavioural @serverless-computing"
      provider: aws
      region: us-east-1
      resource: "cfi-20260527t120000z-fn-bad"
      function-name: "cfi-20260527t120000z-fn-bad"
      private-endpoint-url: "https://private-fn-bad.internal.example.com/invoke"
      public-invoke-url: "https://abcde12345.lambda-url.us-east-1.on.aws/"
      rate-limit-threshold: 10
      burst-overrun: 15
      permitted-regions:
        - us-east-1
      aws-flow-log-group-name: "/aws/lambda/cfi-20260527t120000z-fn-bad"
      test-identities:
        testUserNoAccess:
          user-name: "${AWS_TEST_USER_NO_ACCESS_USER_NAME}"
          access_key_id: "${AWS_TEST_USER_NO_ACCESS_ACCESS_KEY_ID}"
          secret_access_key: "${AWS_TEST_USER_NO_ACCESS_SECRET_ACCESS_KEY}"
          session_token: "${AWS_TEST_USER_NO_ACCESS_SESSION_TOKEN}"
