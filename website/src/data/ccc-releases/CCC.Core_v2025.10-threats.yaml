title: CCC Common Cloud Controls Core Threats
metadata:
    id: CCC.Core.TH
    type: ThreatCatalog
    gemara-version: v1.2.0
    version: v2025.10
    description: Threats for Common Cloud Controls Core technologies, as defined by the FINOS Common Cloud Controls project.
    author:
        id: FINOS-CCC
        name: FINOS Common Cloud Controls
        type: Human
groups:
    - id: Access
      title: Access Control
      description: |
        The Access Control group covers entries related to authentication,
        authorization, and trust perimeter enforcement. This includes
        multi-factor authentication, least privilege access, network access
        rules, and prevention of unauthorized access or reconnaissance.
    - id: Data
      title: Data Resilience
      description: |
        The Data Resilience group covers entries related to ensuring data
        availability, integrity, and sovereignty across its lifecycle. This
        includes replication, backup, recovery, region restrictions, and
        protection against data loss or corruption.
    - id: Observability
      title: Observability
      description: |
        The Observability group covers entries related to logging, monitoring,
        metrics, alerting, and event publication. This includes audit trail
        integrity, enumeration detection, and protection against tampering or
        unauthorized access to operational telemetry.
    - id: Resource
      title: Resource Management
      description: |
        The Resource Management group covers entries related to the lifecycle,
        configuration, and operational integrity of cloud resources. This
        includes resource exhaustion, tag manipulation, version rollback,
        scaling, and cost management.
threats:
    - id: CCC.Core.TH01
      title: Access is Granted to Unauthorized Users
      description: |
        Logic designed to give different permissions to different entities may
        be misconfigured or manipulated, allowing unauthorized entities to access
        restricted parts of the service, its data, or its child resources.
        This could result in a loss of data confidentiality or tolerance of
        unauthorized actions which impact the integrity and availability of
        resources and data.
      group: Access
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP06
              remarks: Access Control
            - reference-id: CCC.Core.CP29
              remarks: Active Ingestion
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH02
      title: Data is Intercepted in Transit
      description: |
        Data transmitted by the service is susceptible to collection by any entity
        with access to any part of the transmission path. Packet observations can
        be used to support the planning of attacks by profiling origin points,
        destinations, and usage patterns. The data may also be vulnerable to
        interception or modification in transit if not properly encrypted,
        impacting the confidentiality or integrity of the transmitted data.
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP08
              remarks: Data Replication
            - reference-id: CCC.Core.CP14
              remarks: API Access
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH03
      title: Deployment Region Network is Untrusted
      description: |
        Systems are susceptible to unauthorized access or interception by actors
        with social or physical control over the network in which they are
        deployed. If the geopolitical status of the deployment network is
        untrusted, unstable, or insecure, this could result in a loss of
        confidentiality, integrity, or availability of the service and its data.
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP08
              remarks: Data Replication
            - reference-id: CCC.Core.CP22
              remarks: Location Lock-In
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH04
      title: Data is Replicated to Untrusted or External Locations
      description: |
        Systems are susceptible to unauthorized access or interception by actors
        with political or physical control over the network in which they are
        deployed. Confidentiality may be impacted if the data is replicated to a
        network where the geopolitical status is untrusted, unstable, or insecure.
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP21
              remarks: Replication
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH05
      title: Interference with Replication Processes
      description: |
        Misconfigured or manipulated replication processes may lead to data being
        copied to unintended locations, delayed, modified, or not being copied
        at all. This could lead to compromised data confidentiality and integrity,
        potentially also affecting recovery processes and data availability.
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP08
              remarks: Data Replication
            - reference-id: CCC.Core.CP12
              remarks: Recovery
            - reference-id: CCC.Core.CP21
              remarks: Replication
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH06
      title: Data is Lost or Corrupted
      description: |
        Services that rely on accurate data are susceptible to disruption in the
        event of data loss or corruption. Any actions that lead to the unintended
        deletion, alteration, or limited access to data can impact the
        availability of the service and the system it is part of.
      group: Data
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP11
              remarks: Backup
            - reference-id: CCC.Core.CP18
              remarks: Versioning
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH07
      title: Logs are Tampered With or Deleted
      description: |
        Tampering or deletion of service logs will reduce the system's ability to
        maintain an accurate record of events. Any actions that compromise the
        integrity of logs could disrupt system availability by disrupting
        monitoring, hindering forensic investigations, and reducing the accuracy
        of audit trails.
      group: Observability
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP03
              remarks: Access Log Publication
            - reference-id: CCC.Core.CP10
              remarks: Logging
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH08
      title: Runtime Metrics are Manipulated
      description: |
        Manipulation of runtime metrics can lead to inaccurate representations of
        system performance and resource utilization. This compromised data
        integrity may also impact system availability through misinformed scaling
        decisions, budget exhaustion, financial losses, and hindered incident
        detection.
      group: Observability
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP15
              remarks: Cost Management
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH09
      title: Runtime Logs are Read by Unauthorized Entities
      description: |
        Unauthorized access to logs may expose valuable information about the
        system's configuration, operations, and security mechanisms. This could
        jeopardize system availability through the exposure of vulnerabilities
        and support the planning of attacks on the service, system, or network.
        If logs are not adequately sanitized, this may also directly impact the
        confidentiality of sensitive data.
      group: Observability
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP03
              remarks: Access Log Publication
            - reference-id: CCC.Core.CP09
              remarks: Metrics Publication
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH19
      title: Metrics are Read by Unauthorized Entities
      description: |
        Unauthorized access to runtime metrics may expose valuable information
        about the system's design, performance, and usage patterns. This can
        support the planning of attacks on the service, system, or network.
      group: Observability
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP09
              remarks: Metrics Publication
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH10
      title: State-change Events are Read by Unauthorized Entities
      description: |
        Unauthorized access to state-change events can reveal information about
        the system's design and usage patterns. This opens the system up to
        attacks of opportunity and support the planning of attacks on the
        service, system, or network.
      group: Observability
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP03
              remarks: Access Log Publication
            - reference-id: CCC.Core.CP07
              remarks: Event Publication
            - reference-id: CCC.Core.CP09
              remarks: Metrics Publication
            - reference-id: CCC.Core.CP17
              remarks: Alerting
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH11
      title: Publications are Incorrectly Triggered
      description: |
        Incorrectly triggered publications may disseminate inaccurate
        or misleading information, creating a data integrity risk. Such
        misinformation can cause unintended operations to be initiated,
        conceal legitimate issues, and disrupt the availability or reliability
        of systems and their data.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP07
              remarks: Event Publication
            - reference-id: CCC.Core.CP17
              remarks: Alerting
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH12
      title: Resource Constraints are Exhausted
      description: |
        Exceeding the resource constraints through excessive consumption,
        resource-intensive operations, or lowering of rate-limit thresholds
        can impact the availability of elements such as memory, CPU, or storage.
        This may disrupt availability of the service or child resources by
        denying the associated functionality to users. If the impacted system is
        not designed to expect such a failure, the effect could also cascade to
        other services and resources.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP04
              remarks: Transaction Rate Limits
            - reference-id: CCC.Core.CP16
              remarks: Budgeting
            - reference-id: CCC.Core.CP19
              remarks: Auto-scaling
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH13
      title: Resource Tags are Manipulated
      description: |
        When resource tags are altered, it can lead to misclassification or
        mismanagement of resources. This can reduce the efficacy of organizational
        policies, billing rules, or network access rules. Such changes could cause
        compromised confidentiality, integrity, or availability of the system and
        its data.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP20
              remarks: Tagging
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH14
      title: Older Resource Versions are Used
      description: |
        Running older versions of child resources can expose the system to known
        vulnerabilities that have been addressed in more recent versions. If the
        version identifier is detected by an attacker, it may be possible to
        exploit these vulnerabilities to compromise the confidentiality,
        integrity, or availability of the system and its data.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP18
              remarks: Versioning
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH15
      title: Automated Enumeration and Reconnaissance by Non-human Entities
      description: |
        Automated processes may be used to gather details about service and
        child resource elements such as APIs, file systems, or directories.
        This information can reveal vulnerabilities, misconfigurations,
        and the network topology, which can be used to plan an attack against
        the system, the service, or its child resources.
      group: Access
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP14
              remarks: API Access
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH16
      title: Publications are Disabled
      description: |
        Publication of events, metrics, and runtime logs may be disabled, leading
        to a lack of expected security and operational information being shared.
        This can impact system availability by delaying the detection of
        incidents while also impacting system design decisions and enforcement of
        operational thresholds, such as autoscaling or cost management.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP10
              remarks: Logging
            - reference-id: CCC.Core.CP09
              remarks: Metrics Publication
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH18
      title: Encryption Key is Misused
      description: |
        Encryption keys may be used by an unauthorized entity due to inadequate
        key management practices or the compromise of a connected system. This
        could lead to the decryption of sensitive data, impacting its
        confidentiality and integrity.
      group: Resource
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP01
              remarks: Encryption in Transit Enabled by Default
            - reference-id: CCC.Core.CP02
              remarks: Encryption at Rest Enabled by Default
          reference-id: CCC.Core.Capabilities
    - id: CCC.Core.TH17
      title: Responses are Generated for Unauthorized Requests
      description: |
        The service may generate responses to requests from unauthorized entities.
        This could lead to the exposure of system details, which may be used to
        plan an attack against the service, system, or network. Additionally,
        allocating resources to service the request could lead to a denial of
        service for legitimate users, leading to a loss of availability anywhere
        in the system.
      group: Access
      capabilities:
        - entries:
            - reference-id: CCC.Core.CP29
              remarks: Active Ingestion
          reference-id: CCC.Core.Capabilities
