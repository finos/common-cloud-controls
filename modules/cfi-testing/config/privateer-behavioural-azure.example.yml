# Example Privateer config for CCC behavioural tests (Azure object-storage).
# Copy to config.yml and run from a directory where paths resolve, or pass -c this/file.
#
#   privateer run -c config/privateer-behavioural-azure.example.yml
#
# Or debug the plugin without the host:
#   cd modules/privateer-plugin && go run . debug -c ../cfi-testing/config/privateer-behavioural-azure.example.yml -s azureStorageBehavioural
#
# Dummy policy block satisfies Privateer config validation when other tools read services;
# this plugin does not run Gemara policy assessments.

loglevel: info
write-directory: evaluation_results
write: true
output: yaml

services:
  azureStorageBehavioural:
    plugin: privateer-plugin
    policy:
      catalogs:
        - CCC.ObjStor
      applicability:
        - tlp-amber
        - tlp-clear
        - tlp-green
        - tlp-red
    vars:
      env-file: ../../cfi-testing/config/azure-storage-finos.yaml
      instance: azure-storage-finos
      service: object-storage
      tags: "@Behavioural"
      # Optional: set INSTANCE_ID for ${INSTANCE_ID} in env YAML (or use cfi_test_<suffix> instance shorthand in env file mapping via run-compliance-tests.sh)
      # instance-id: "20260408t161043z"
