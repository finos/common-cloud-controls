name: Release Catalog

# Release a single typed catalog asset.
#
# Pick the catalog (family/service, e.g. storage/object) + the asset type. The
# delivery-toolkit compiles ONE typed catalog — CapabilityCatalog / ControlCatalog
# / ThreatCatalog — there is no omnibus. The release artifact IS that single typed
# catalog.
#
# Then (augmenting the old release flow) two publishing steps run:
#   1. NEW: grcli validates the artifact against the Gemara spec and publishes it to
#      grc.store. repository = metadata.author.id/metadata.id, tag = metadata.version
#      — both inferred from the artifact, nothing else to supply.
#   2. OLD: a GitHub release is cut carrying the same typed catalog YAML.
#
# `version` is supplied here at release time — it is intentionally NOT stored in
# source metadata.yaml — and `compile` stamps it into the artifact.
#
# Auth: no secrets for publish. grcli mints a GitHub Actions OIDC token (id-token:
# write below) for the grc.store hub sync and cosign keyless signing.
#
# compile is implemented for `capabilities` (validated end-to-end against the
# Gemara CUE spec via grcli). `threats` and `controls` are not wired yet and
# will fail with a clear error until implemented.

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "Catalog to release — family/service (e.g. storage/object)"
        required: true
        type: string
      asset_type:
        description: "Asset type to release"
        required: true
        type: choice
        options:
          - capabilities
          - threats
          - controls
      version:
        description: "Release version (e.g. v2026.04 or v2026.04-rc1) — stamped into the artifact"
        required: true
        type: string
      dry_run:
        description: "Dry run — compile + validate + build the bundle, but do not push to grc.store or cut a GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write # cut the GitHub release
  id-token: write # grcli mints a GHA OIDC token for hub auth + cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    # Inputs are funneled through env to keep free-text values out of run: scripts.
    env:
      BUILD_TARGET: ${{ inputs.build_target }}
      ASSET_TYPE: ${{ inputs.asset_type }}
      VERSION: ${{ inputs.version }}
      DRY_RUN: ${{ inputs.dry_run }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify source file exists
        run: |
          src="catalogs/${BUILD_TARGET}/${ASSET_TYPE}.yaml"
          if [ ! -f "$src" ]; then
            echo "::error::No source file at ${src} — check the build target and asset type."
            exit 1
          fi
          echo "Source: ${src}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: delivery-toolkit/go.mod

      - name: Compile the typed catalog
        working-directory: delivery-toolkit
        run: |
          go run . compile \
            --build-target "$BUILD_TARGET" \
            --type "$ASSET_TYPE" \
            --version "$VERSION" \
            --catalogs-dir ../catalogs \
            --output-dir ../artifacts

      - name: Locate compiled artifact
        id: artifact
        run: |
          file="$(find "artifacts/${BUILD_TARGET}" -name "${ASSET_TYPE}.yaml" | head -1)"
          if [ -z "$file" ]; then
            echo "::error::compile produced no ${ASSET_TYPE}.yaml under artifacts/${BUILD_TARGET}"
            exit 1
          fi
          gemara_version="$(grep -E '^[[:space:]]*gemara-version:' "$file" | head -1 | awk '{print $2}')"
          echo "file=${file}" >> "$GITHUB_OUTPUT"
          echo "gemara_version=${gemara_version}" >> "$GITHUB_OUTPUT"
          echo "Compiled: ${file} (gemara ${gemara_version})"

      # grcli, pulled from its OCI distribution exactly as documented.
      - uses: oras-project/setup-oras@v1
      - name: Install grcli
        # Pinned for reproducibility (not :latest). Bump deliberately after testing.
        env:
          GRCLI_VERSION: v0.1.0
        run: |
          oras pull "ghcr.io/revanite-io/grcli:${GRCLI_VERSION}" --platform linux/amd64
          sudo install grcli /usr/local/bin/grcli
          grcli --version

      # validate shells out to `cue vet`; publish keyless-signs via `cosign`.
      - name: Install cue
        run: go install cuelang.org/go/cmd/cue@v0.16.1
      - uses: sigstore/cosign-installer@v3

      - name: Validate against the Gemara spec
        env:
          ARTIFACT: ${{ steps.artifact.outputs.file }}
          GEMARA_VERSION: ${{ steps.artifact.outputs.gemara_version }}
        run: |
          git clone --depth 1 --branch "$GEMARA_VERSION" \
            https://github.com/gemaraproj/gemara /tmp/gemara-spec
          grcli validate -f "$ARTIFACT" --spec /tmp/gemara-spec

      # NEW publishing step: push the typed catalog to grc.store.
      - name: Publish to grc.store
        env:
          ARTIFACT: ${{ steps.artifact.outputs.file }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            grcli publish "$ARTIFACT" --dry-run --output artifacts/oci
          else
            grcli publish "$ARTIFACT"
          fi

      # Augmented old flow: cut a GitHub release carrying the single typed catalog.
      # (Redundant with grc.store — kept per "augment"; safe to drop later.)
      - name: Cut GitHub release
        if: ${{ inputs.dry_run == false }}
        env:
          ARTIFACT: ${{ steps.artifact.outputs.file }}
        run: |
          prerelease=""
          case "$VERSION" in *rc*) prerelease="--prerelease" ;; esac
          # Create the release for this version if it doesn't exist yet; otherwise
          # just add this asset to it (multiple asset types share one version tag).
          gh release create "$VERSION" "$ARTIFACT" \
            --title "${BUILD_TARGET} ${ASSET_TYPE} ${VERSION}" \
            --notes "Release of ${BUILD_TARGET} ${ASSET_TYPE} (${VERSION}), published to grc.store." \
            $prerelease \
          || gh release upload "$VERSION" "$ARTIFACT" --clobber
