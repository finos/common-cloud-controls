# DEPRECATED — website releases are halted.
#
# This workflow used to ping a Netlify build hook nightly, which rebuilt the site
# via `website` prebuild (scripts/GenerateReleaseCatalogs.ts → delivery-toolkit).
# Website releases are paused pending the website's migration to the new per-type
# catalog format. The nightly schedule is removed and the job is gated off so it
# cannot run. Do NOT re-enable until the website consumes the new-schema artifacts.
#
# (Netlify's push-triggered auto-deploy, if enabled, is configured in Netlify, not
# here — disable it there too if you need to fully halt site rebuilds.)
name: Nightly Netlify Build (DEPRECATED — disabled)
on:
  workflow_dispatch: # manual only; job is gated off below
jobs:
  trigger:
    if: false # DEPRECATED: website releases halted — see header
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build hook
        run: curl -X POST -s -o /dev/null -w "%{http_code}\n" "$NETLIFY_BUILD_HOOK"
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
